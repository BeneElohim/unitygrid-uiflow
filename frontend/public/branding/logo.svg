<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ug-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EE3B5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer hexagon grid ring -->
  <polygon points="100,10 185,55 185,145 100,190 15,145 15,55" fill="none" stroke="url(#ug-grad)" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <!-- Inner hexagon -->
  <polygon points="100,35 160,68 160,132 100,165 40,132 40,68" fill="none" stroke="url(#ug-grad)" stroke-width="2" opacity="0.5"/>
  <!-- Central Ω glyph -->
  <text x="100" y="125" text-anchor="middle" font-family="serif" font-size="72" font-weight="bold" fill="url(#ug-grad)" filter="url(#glow)">Ω</text>
  <!-- Grid dots at hex vertices -->
  <circle cx="100" cy="10" r="4" fill="#0EE3B5" opacity="0.9"/>
  <circle cx="185" cy="55" r="4" fill="#818cf8" opacity="0.9"/>
  <circle cx="185" cy="145" r="4" fill="#7c3aed" opacity="0.9"/>
  <circle cx="100" cy="190" r="4" fill="#0EE3B5" opacity="0.9"/>
  <circle cx="15" cy="145" r="4" fill="#818cf8" opacity="0.9"/>
  <circle cx="15" cy="55" r="4" fill="#7c3aed" opacity="0.9"/>
</svg>
